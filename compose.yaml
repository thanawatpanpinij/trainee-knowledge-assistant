services:
  web:
    build: .
    container_name: nextjs-chat-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./dev.db:/app/dev.db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    env_file:
      - .env
      - .env.local
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
